# nexsys-bench reference stack — ZHA-first (Home Assistant), Z2M reserved for the D5/exposes cross-check pass.
# Lives + runs on the Pi at /mnt/nvme/bench. Bring up ONE coordinator-owning stack at a time (HA OR z2m; the
# dongle is single-owner). Data on the NVMe for endurance. /dev/zigbee is the udev-pinned coordinator symlink.
#
#   ssh pi 'cd /mnt/nvme/bench && docker compose up -d homeassistant'
#   (later, D5 pass)  docker compose stop homeassistant && docker compose --profile z2m up -d
services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: hs-bench-ha
    restart: unless-stopped
    network_mode: host          # HA wants host networking for discovery; UI on http://<pi>:8123
    volumes:
      - /mnt/nvme/bench/ha-config:/config
      - /run/dbus:/run/dbus:ro
    devices:
      - /dev/zigbee:/dev/zigbee  # the udev-pinned MG24 coordinator (add ZHA on /dev/zigbee, EZSP/bellows)
    environment:
      - TZ=America/New_York

