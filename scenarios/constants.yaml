# RE-MINTED AT EVERY ARC BOUNDARY (Wave-2 joins, a SEED re-formation, the
# NQ-6 close-out) by the operator/hub — A STALE CONSTANT IS A SCENARIO
# DEFECT, NOT A PLATFORM DEFECT. Every value carries its source; re-verify
# the flagged ones against the live log at the first Pi run.
#
# Capability flips (capabilities: below) are a constants re-mint, never a
# code edit (B1-REV1).
#
# RE-MINT OF RECORD 2026-07-21 (v35 hub, beat 7 — the 04P/LEARN-PERSIST
# close): every value below re-read AT the instrument from the standing-
# posture boot bench-2026-07-21-073330.log (projection_live 6/6 @ 25065 ·
# network_resumed ch20/0x774c · learned_zonetypes_rehydrated count=1 ·
# permit_join_opened count 0). Adjudication of record: the watermark pins
# the registry projection_live replay-head, NEVER the read-model
# viewPosition (the certification-era instrument correction). Detail:
# pm-handoff v35 beat 7.

fleet:
